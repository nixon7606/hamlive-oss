nodeenv: 'production'
loglevel: 'info'
realtime_mongoose_poolsize: 20
dbname: 'hamlive-prod'
# Connection string comes from the MONGODB_URI environment variable (see INSTALL.md).
batch_mongoose_poolsize: 2
# Set BASE_URL to your instance's public URL (used for OAuth callbacks and email links).
base_url: 'http://localhost:3000'
background_tasks:
    closeIdleNets:
        enabled: true
        options:
            abandoned_after_hours: 2
    flagAccounts:
        enabled: true
        options:
            ttl_days: 180
            account_create_min: 10
    deleteFlaggedAccounts:
        enabled: true
        options:
    processUnfollowJobs:
        enabled: true
        options:
    scheduledNetStarter:
        enabled: true
        options:

netadmin_commands:
    help:
        enabled: true
    sys:
        enabled: true
    whoAmI:
        enabled: true
    checkIn:
        enabled: true
    checkInH:
        enabled: true
    checkInL:
        enabled: true
    checkOut:
        enabled: true
    checkInOut:
        enabled: true
    unCheckIn:
        enabled: true
    hand:
        enabled: true
    nickname:
        enabled: true
    handoff:
        enabled: true
    logger:
        enabled: true
    relay:
        enabled: true
    owner:
        enabled: true
    frequency:
        enabled: true
    count:
        enabled: true
    close:
        enabled: true
    ban:
        enabled: true
    unban:
        enabled: true
