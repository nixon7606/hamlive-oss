#
nodeenv: 'development'
# Run daily maintenance (close idle nets, flag/delete stale accounts, etc.) on
# every server start. `true` in dev is handy for debugging the tasks — but note
# that nodemon restarts often, so maintenance re-runs each restart and, given
# the short dev TTLs below, may close/flag/delete your test data. Set to `false`
# if you want test data to stick around (maintenance still runs once/day).
run_background_tasks_on_startup: true
realtime_mongoose_poolsize: 5
dbname: 'hamlive-dev'
# Connection string comes from the MONGODB_URI environment variable (see .env.example).
batch_mongoose_poolsize: 1
# Dev serves plain HTTP on localhost by default (no certificate warning).
# Override with the BASE_URL environment variable; use https://localhost:3000
# only if you start the dev server with HTTPS=true.
base_url: 'http://localhost:3000'
background_tasks:
    closeIdleNets:
        enabled: true
        options:
            abandoned_after_hours: 0.01
    flagAccounts:
        enabled: true
        options:
            ttl_days: 1
            account_create_min: 2
    deleteFlaggedAccounts:
        enabled: true
        options:
    processUnfollowJobs:
        enabled: true
        options:

netadmin_commands:
    help:
        enabled: true
    sys:
        enabled: true
    whoAmI:
        enabled: true
    checkIn:
        enabled: true
    checkInH:
        enabled: true
    checkInL:
        enabled: true
    checkOut:
        enabled: true
    checkInOut:
        enabled: true
    unCheckIn:
        enabled: true
    hand:
        enabled: true
    nickname:
        enabled: true
    handoff:
        enabled: true
    logger:
        enabled: true
    relay:
        enabled: true
    owner:
        enabled: true
    frequency:
        enabled: true
    count:
        enabled: true
    close:
        enabled: true
    ban:
        enabled: true
    unban:
        enabled: true
