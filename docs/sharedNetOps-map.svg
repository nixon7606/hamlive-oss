<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <defs>
    <style>
      .title {
        font: bold 18px sans-serif;
        fill: #1a202c;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #2d3748;
      }

      .section-title {
        font: bold 14px sans-serif;
        fill: #2d3748;
      }

      .label {
        font: 12px sans-serif;
        fill: #2d3748;
      }

      .small-label {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .code {
        font: 10px monospace;
        fill: #2d3748;
      }

      .caller-box {
        fill: #e6fffa;
        stroke: #319795;
        stroke-width: 2;
        rx: 8;
      }

      .domain-box {
        fill: #fed7d7;
        stroke: #fc8181;
        stroke-width: 3;
        rx: 8;
      }

      .core-box {
        fill: #fbb6ce;
        stroke: #d53f8c;
        stroke-width: 2;
        rx: 6;
      }

      .service-box {
        fill: #ebf8ff;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .data-box {
        fill: #faf5ff;
        stroke: #805ad5;
        stroke-width: 2;
        rx: 8;
      }

      .role-box {
        fill: #fffaf0;
        stroke: #dd6b20;
        stroke-width: 2;
        rx: 8;
      }

      .call-arrow {
        fill: none;
        stroke: #319795;
        stroke-width: 2;
        marker-end: url(#teal-arrow);
      }

      .service-arrow {
        fill: none;
        stroke: #3182ce;
        stroke-width: 2;
        marker-end: url(#blue-arrow);
      }

      .data-arrow {
        fill: none;
        stroke: #805ad5;
        stroke-width: 2;
        marker-end: url(#purple-arrow);
      }

      .broadcast-arrow {
        fill: none;
        stroke: #e53e3e;
        stroke-width: 2;
        marker-end: url(#red-arrow);
      }
    </style>
    <defs>
      <marker id="teal-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#319795" />
      </marker>
      <marker id="blue-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce" />
      </marker>
      <marker id="purple-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#805ad5" />
      </marker>
      <marker id="red-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e" />
      </marker>
    </defs>
  </defs>

  <!-- Title -->
  <text x="700" y="30" class="title" text-anchor="middle">SharedNetOps Domain Logic Architecture</text>
  <text x="700" y="55" class="subtitle" text-anchor="middle">Centralized Business Logic with Role-Based Permissions + Multi-Collection Updates + SSE Broadcasting</text>

  <!-- Left Column: Callers -->
  <text x="50" y="90" class="section-title">Callers &amp; Entry Points</text>

  <!-- Admin Commands -->
  <rect x="50" y="110" width="220" height="100" class="caller-box" />
  <text x="160" y="130" class="label" text-anchor="middle">Net Admin Commands</text>
  <text x="60" y="150" class="small-label">server/dist/lib/netAdminCommands/*</text>
  <text x="60" y="165" class="small-label">• startNet.js → sharedNetOps.startNet()</text>
  <text x="60" y="180" class="small-label">• closeNet.js → sharedNetOps.closeNet()</text>
  <text x="60" y="195" class="small-label">• deleteNet.js → sharedNetOps.delNet()</text>

  <!-- Background Tasks -->
  <rect x="50" y="230" width="220" height="100" class="caller-box" />
  <text x="160" y="250" class="label" text-anchor="middle">Background Tasks</text>
  <text x="60" y="270" class="small-label">server/dist/lib/backgroundTasks/*</text>
  <text x="60" y="285" class="small-label">• Scheduled net cleanup</text>
  <text x="60" y="300" class="small-label">• Automated state transitions</text>
  <text x="60" y="315" class="small-label">• Maintenance operations</text>

  <!-- Controllers -->
  <rect x="50" y="350" width="220" height="120" class="caller-box" />
  <text x="160" y="370" class="label" text-anchor="middle">HTTP Controllers</text>
  <text x="60" y="390" class="small-label">server/dist/controllers/*</text>
  <text x="60" y="405" class="small-label">• interactionController → checkState()</text>
  <text x="60" y="420" class="small-label">• liveNetController → hand(), highlight()</text>
  <text x="60" y="435" class="small-label">• followController → follow/unfollow</text>
  <text x="60" y="450" class="small-label">• netProfileController → net CRUD</text>

  <!-- Center: SharedNetOps Domain -->
  <rect x="320" y="110" width="400" height="360" class="domain-box" />
  <text x="520" y="135" class="section-title" text-anchor="middle">SharedNetOps Domain Layer</text>
  <text x="520" y="155" class="subtitle" text-anchor="middle">server/dist/lib/sharedNetOps.js (800+ lines)</text>

  <!-- Core Functions -->
  <rect x="340" y="170" width="360" height="120" class="core-box" />
  <text x="520" y="190" class="label" text-anchor="middle">Core Functions</text>
  <text x="350" y="210" class="small-label">• checkState(npid, stationProfileId, body) → interaction validation</text>
  <text x="350" y="225" class="small-label">• setNetRole(lnid, station, newRole) → role changes &amp; net control transfer</text>
  <text x="350" y="240" class="small-label">• hand(liveNet, srcStation, dstStation, state) → raise/lower hand state</text>
  <text x="350" y="255" class="small-label">• highlight(npid, stationProfileId, text) → message highlighting</text>
  <text x="350" y="270" class="small-label">• closeNet(npid, closedBy) → net closure with cleanup</text>

  <!-- Permission System -->
  <rect x="340" y="310" width="170" height="120" class="role-box" />
  <text x="425" y="330" class="label" text-anchor="middle">Role System</text>
  <text x="350" y="350" class="small-label">Level 0: netcontrol</text>
  <text x="355" y="365" class="code">• All operations</text>
  <text x="350" y="380" class="small-label">Level 1: netlogger</text>
  <text x="355" y="395" class="code">• Log interactions</text>
  <text x="350" y="410" class="small-label">Level 2: netrelay</text>
  <text x="355" y="425" class="code">• Relay messages</text>

  <!-- Validation -->
  <rect x="530" y="310" width="170" height="120" class="role-box" />
  <text x="615" y="330" class="label" text-anchor="middle">Validation Layer</text>
  <text x="540" y="350" class="small-label">• Permission checking</text>
  <text x="540" y="365" class="small-label">• Role hierarchy enforcement</text>
  <text x="540" y="380" class="small-label">• State transition validation</text>
  <text x="540" y="395" class="small-label">• Input sanitization</text>
  <text x="540" y="410" class="small-label">• Business rule enforcement</text>

  <!-- Right Column: Services -->
  <text x="780" y="90" class="section-title">Supporting Services</text>

  <!-- Real-time Manager -->
  <rect x="780" y="110" width="200" height="100" class="service-box" />
  <text x="880" y="130" class="label" text-anchor="middle">Real-time Manager</text>
  <text x="790" y="150" class="small-label">realtimeClients.ts</text>
  <text x="790" y="165" class="small-label">• SSE connection management</text>
  <text x="790" y="180" class="small-label">• LiveNetDetails broadcasting</text>
  <text x="790" y="195" class="small-label">• Client presence tracking</text>

  <!-- Notification Service -->
  <rect x="780" y="230" width="200" height="100" class="service-box" />
  <text x="880" y="250" class="label" text-anchor="middle">Notification Service</text>
  <text x="790" y="270" class="small-label">userNotification.ts</text>
  <text x="790" y="285" class="small-label">• Email report generation</text>
  <text x="790" y="300" class="small-label">• User notification queuing</text>
  <text x="790" y="315" class="small-label">• Alert management</text>

  <!-- External Services -->
  <rect x="780" y="350" width="200" height="120" class="service-box" />
  <text x="880" y="370" class="label" text-anchor="middle">External Services</text>
  <text x="790" y="390" class="small-label">• QRZ.com callsign lookup</text>
  <text x="790" y="405" class="small-label">• Email service integration</text>
  <text x="790" y="420" class="small-label">• GetStream chat coordination</text>
  <text x="790" y="435" class="small-label">• GetStream image sharing</text>
  <text x="790" y="450" class="small-label">• Google OAuth validation</text>

  <!-- Far Right: Data Layer -->
  <text x="1050" y="90" class="section-title">Data Layer</text>

  <!-- MongoDB Collections -->
  <rect x="1050" y="110" width="280" height="200" class="data-box" />
  <text x="1190" y="130" class="label" text-anchor="middle">MongoDB Collections</text>
  <text x="1060" y="150" class="small-label">Primary Collections:</text>
  <text x="1060" y="170" class="small-label">• LiveNet → net instances &amp; state</text>
  <text x="1060" y="185" class="small-label">• NetProfile → net templates &amp; config</text>
  <text x="1060" y="200" class="small-label">• StationInteraction → check-ins &amp; events</text>
  <text x="1060" y="215" class="small-label">• UserProfile → user accounts &amp; auth</text>
  <text x="1060" y="230" class="small-label">• StationProfile → callsign data</text>
  <text x="1060" y="245" class="small-label">• Favorite → user subscriptions</text>
  <text x="1060" y="260" class="small-label">• RealtimeSession → active connections</text>
  <text x="1060" y="280" class="small-label">• AuditLog → operation tracking</text>
  <text x="1060" y="295" class="small-label">• SystemConfig → application settings</text>

  <!-- Task Queues -->
  <rect x="1050" y="330" width="280" height="140" class="data-box" />
  <text x="1190" y="350" class="label" text-anchor="middle">Task Queues &amp; Cache</text>
  <text x="1060" y="370" class="small-label">Background Processing:</text>
  <text x="1060" y="390" class="small-label">• PendingUnfollow → delayed unfollow ops</text>
  <text x="1060" y="405" class="small-label">• PendingAccountDelete → user cleanup</text>
  <text x="1060" y="420" class="small-label">• QrzCache → callsign lookup cache</text>
  <text x="1060" y="435" class="small-label">• NotificationQueue → email/SMS queue</text>
  <text x="1060" y="450" class="small-label">• ReportQueue → scheduled reports</text>

  <!-- Flow Arrows -->

  <!-- Callers to SharedNetOps -->
  <line x1="270" y1="160" x2="320" y2="200" class="call-arrow" />
  <line x1="270" y1="280" x2="320" y2="250" class="call-arrow" />
  <line x1="270" y1="410" x2="320" y2="300" class="call-arrow" />

  <!-- SharedNetOps to Services -->
  <line x1="720" y1="200" x2="780" y2="160" class="service-arrow" />
  <line x1="720" y1="250" x2="780" y2="280" class="service-arrow" />
  <line x1="720" y1="350" x2="780" y2="410" class="service-arrow" />

  <!-- SharedNetOps to Data -->
  <line x1="720" y1="280" x2="1050" y2="200" class="data-arrow" />
  <line x1="720" y1="350" x2="1050" y2="400" class="data-arrow" />

  <!-- SSE Broadcasting -->
  <path d="M 880 210 Q 1000 100 520 170" class="broadcast-arrow" fill="none" />
  <text x="800" y="140" class="small-label">SSE broadcasts</text>

  <!-- Operation Flow Examples -->
  <rect x="50" y="520" width="1280" height="180" class="role-box" />
  <text x="690" y="545" class="section-title" text-anchor="middle">Key Operation Flows</text>

  <text x="70" y="570" class="label">1. Station Check-in Flow (checkState):</text>
  <text x="70" y="590" class="small-label">Controller → checkState(npid, stationProfileId, body) → Role validation → Insert StationInteraction → Update LiveNet → SSE broadcast → Notify subscribers</text>

  <text x="70" y="615" class="label">2. Net Control Transfer (setNetRole):</text>
  <text x="70" y="635" class="small-label">Admin command → setNetRole(lnid, station, 'netcontrol') → Verify permissions → Update role in StationInteraction → Log audit event → SSE push → Update all clients</text>

  <text x="70" y="660" class="label">3. Net Closure (closeNet):</text>
  <text x="70" y="680" class="small-label">Background task → closeNet(npid, closedBy) → Multi-collection updates → Archive interactions → Cleanup RealtimeSession → Generate reports → Notify followers</text>

  <!-- Business Rules -->
  <rect x="50" y="720" width="630" height="150" class="caller-box" />
  <text x="365" y="745" class="section-title" text-anchor="middle">Business Rules &amp; Constraints</text>

  <text x="70" y="770" class="label">Permission Hierarchy:</text>
  <text x="70" y="790" class="small-label">• netcontrol (0) can perform all operations including hand-offs and net closure</text>
  <text x="70" y="805" class="small-label">• netlogger (1) can log interactions and manage station check-ins</text>
  <text x="70" y="820" class="small-label">• netrelay (2) can relay messages and submit basic interactions</text>
  <text x="70" y="835" class="small-label">• netuser (3) can check in and submit signal reports only</text>
  <text x="70" y="850" class="small-label">• Operations fail with permission denied if role level is insufficient</text>

  <!-- Technical Patterns -->
  <rect x="700" y="720" width="630" height="150" class="service-box" />
  <text x="1015" y="745" class="section-title" text-anchor="middle">Technical Implementation Patterns</text>

  <text x="720" y="770" class="label">Transaction Safety:</text>
  <text x="720" y="790" class="small-label">• MongoDB sessions for multi-document operations</text>
  <text x="720" y="805" class="small-label">• Atomic updates with rollback capability</text>
  <text x="720" y="820" class="small-label">• Optimistic locking for concurrent operations</text>
  <text x="720" y="835" class="small-label">• SSE broadcasts only after successful DB commits</text>
  <text x="720" y="850" class="small-label">• Comprehensive error logging and audit trails</text>

  <!-- Performance Notes -->
  <rect x="50" y="890" width="1280" height="80" class="domain-box" />
  <text x="690" y="915" class="section-title" text-anchor="middle">Performance &amp; Scalability Considerations</text>

  <text x="70" y="940" class="small-label">• Efficient indexing on collection queries (compound indexes for netProfileId + timestamp patterns)</text>
  <text x="70" y="955" class="small-label">• Connection pooling for SSE manager with TTL-based cleanup to prevent memory leaks</text>

  <text x="700" y="940" class="small-label">• Batch operations for bulk updates and bulk notification processing</text>
  <text x="700" y="955" class="small-label">• Caching strategies for frequently accessed data (QRZ lookups, user profiles)</text>

</svg>