<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200">
  <defs>
    <style>
      .title {
        font: bold 18px sans-serif;
        fill: #2d3748;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #4a5568;
      }

      .collection-title {
        font: bold 13px sans-serif;
        fill: #2d3748;
      }

      .field-text {
        font: 11px sans-serif;
        fill: #2d3748;
      }

      .type-text {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .index-text {
        font: 9px sans-serif;
        fill: #805ad5;
        font-style: italic;
      }

      .validation-text {
        font: 9px sans-serif;
        fill: #38a169;
        font-style: italic;
      }

      .core-collection {
        fill: #bee3f8;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .profile-collection {
        fill: #c6f6d5;
        stroke: #38a169;
        stroke-width: 2;
        rx: 8;
      }

      .interaction-collection {
        fill: #fed7d7;
        stroke: #e53e3e;
        stroke-width: 2;
        rx: 8;
      }

      .system-collection {
        fill: #faf089;
        stroke: #d69e2e;
        stroke-width: 2;
        rx: 8;
      }

      .relationship {
        fill: none;
        stroke: #e53e3e;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .reference {
        fill: none;
        stroke: #805ad5;
        stroke-width: 2;
        marker-end: url(#arrowhead);
        stroke-dasharray: 5, 5;
      }

      .one-to-many {
        fill: none;
        stroke: #38a169;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e53e3e" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="30" class="title" text-anchor="middle">Ham.Live Complete Database Schema (MongoDB)</text>
  <text x="800" y="50" class="subtitle" text-anchor="middle">9 Collections with Relationships, Indexes, and Validation Rules</text>

  <!-- Core Collections (Top Row) -->

  <!-- LiveNet Collection -->
  <rect x="60" y="80" width="320" height="240" class="core-collection" />
  <text x="220" y="100" class="collection-title" text-anchor="middle">LiveNet (Active Net Sessions)</text>
  <text x="70" y="120" class="field-text">_id: ObjectId</text>
  <text x="70" y="135" class="field-text">lookupTable: Map&lt;callSign, {stationInteraction: ObjectId}&gt;</text>
  <text x="70" y="150" class="field-text">netProfile: ObjectId → NetProfile (required)</text>
  <text x="70" y="165" class="field-text">netControl: ObjectId → UserProfile (required)</text>
  <text x="70" y="180" class="field-text">countdownTimer: Number [0-120] (default: 1)</text>
  <text x="70" y="195" class="field-text">started: Boolean (default: false)</text>
  <text x="70" y="210" class="field-text">startedAt: Date (default: null)</text>
  <text x="70" y="225" class="field-text">closing: Boolean (default: false)</text>
  <text x="70" y="240" class="field-text">url: String (required, unique)</text>
  <text x="70" y="255" class="field-text">createdAt: Date, updatedAt: Date</text>
  <text x="70" y="270" class="field-text">Note: Real-time state via lookupTable Map</text>
  <text x="60" y="285" class="index-text">Indexes: url (unique), netProfile, lookupTable (auto)</text>
  <text x="60" y="300" class="validation-text">Validation: url unique, netProfile + netControl required</text>

  <!-- NetProfile Collection -->
  <rect x="400" y="80" width="320" height="240" class="profile-collection" />
  <text x="560" y="100" class="collection-title" text-anchor="middle">NetProfile (Net Templates)</text>
  <text x="410" y="120" class="field-text">_id: ObjectId</text>
  <text x="410" y="135" class="field-text">title: String (required, unique)</text>
  <text x="410" y="150" class="field-text">frequency: String, mode: String (required)</text>
  <text x="410" y="165" class="field-text">notes: String, modeDetails: String</text>
  <text x="410" y="180" class="field-text">owners: [ObjectId] → UserProfile (required)</text>
  <text x="410" y="195" class="field-text">followers: [ObjectId] → UserProfile (subscribers)</text>
  <text x="410" y="210" class="field-text">liveNet: ObjectId → LiveNet (when active)</text>
  <text x="410" y="225" class="field-text">permanent: Boolean, autoIn: Boolean</text>
  <text x="410" y="240" class="field-text">restrictedSigReports: Boolean</text>
  <text x="410" y="255" class="field-text">invisible: Boolean (default: false)</text>
  <text x="410" y="270" class="field-text">createdAt: Date, updatedAt: Date</text>
  <text x="410" y="285" class="index-text">Indexes: title (unique), owners, permanent</text>
  <text x="410" y="300" class="validation-text">Validation: title required + unique, owners required</text>

  <!-- UserProfile Collection -->
  <rect x="750" y="80" width="320" height="240" class="profile-collection" />
  <text x="910" y="100" class="collection-title" text-anchor="middle">UserProfile (User Accounts)</text>
  <text x="760" y="120" class="field-text">_id: ObjectId</text>
  <text x="760" y="135" class="field-text">email: String (required, unique)</text>
  <text x="760" y="150" class="field-text">displayName: String (required)</text>
  <text x="760" y="165" class="field-text">callSign: String (unique, sparse)</text>
  <text x="760" y="180" class="field-text">photo: String (URL), location: String</text>
  <text x="760" y="195" class="field-text">myNets: [ObjectId] → NetProfile (owned nets)</text>
  <text x="760" y="210" class="field-text">following: [ObjectId] → NetProfile (subscribed nets)</text>
  <text x="760" y="225" class="field-text">googleId: String (OAuth), lastLogin: Date</text>
  <text x="760" y="240" class="field-text">flaggedForDeletion: Boolean, superUser: Boolean</text>
  <text x="760" y="255" class="field-text">flexOptions: Object (user preferences)</text>
  <text x="760" y="270" class="field-text">lastAuthVia: String ["google", "email"]</text>
  <text x="760" y="285" class="index-text">Indexes: email (unique), callSign (unique sparse)</text>
  <text x="760" y="300" class="validation-text">Validation: email format, callSign format</text>

  <!-- FlexOpts Collection -->
  <rect x="1100" y="80" width="320" height="240" class="system-collection" />
  <text x="1260" y="100" class="collection-title" text-anchor="middle">FlexOpts (Configuration)</text>
  <text x="1110" y="120" class="field-text">_id: ObjectId</text>
  <text x="1110" y="135" class="field-text">scope: String ["global", "local"]</text>
  <text x="1110" y="150" class="field-text">targetId: ObjectId (for local scope)</text>
  <text x="1110" y="165" class="field-text">option: Object (configuration values)</text>
  <text x="1110" y="180" class="field-text">• awayInMs: Number</text>
  <text x="1110" y="195" class="field-text">• chatEnabled: Boolean</text>
  <text x="1110" y="210" class="field-text">• maxNetsPerUser: Number</text>
  <text x="1110" y="225" class="field-text">• ads: Number [0-100]</text>
  <text x="1110" y="240" class="field-text">• analytics: Boolean</text>
  <text x="1110" y="255" class="field-text">• email: Boolean</text>
  <text x="1110" y="270" class="field-text">createdBy: ObjectId → UserProfile</text>
  <text x="1110" y="285" class="index-text">Indexes: scope + targetId (compound)</text>
  <text x="1110" y="300" class="validation-text">Validation: scope enum, option validation</text>

  <!-- Interaction Collections (Middle Row) -->

  <!-- StationInteraction Collection -->
  <rect x="50" y="350" width="380" height="240" class="interaction-collection" />
  <text x="240" y="370" class="collection-title" text-anchor="middle">StationInteraction (Station State &amp; Activity)</text>
  <text x="60" y="390" class="field-text">_id: ObjectId</text>
  <text x="60" y="405" class="field-text">liveNet: ObjectId → LiveNet (required)</text>
  <text x="60" y="420" class="field-text">netProfile: ObjectId → NetProfile (required)</text>
  <text x="60" y="435" class="field-text">userProfile: ObjectId → UserProfile</text>
  <text x="60" y="450" class="field-text">callSign: String (required)</text>
  <text x="60" y="465" class="field-text">checkedState: Boolean [true=in, false=out, null=spectator]</text>
  <text x="60" y="480" class="field-text">role: String ["netuser", "netlogger", "netrelay", "netcontrol"]</text>
  <text x="60" y="495" class="field-text">hand: Boolean (default: false)</text>
  <text x="60" y="510" class="field-text">highlight: Boolean (default: false)</text>
  <text x="60" y="525" class="field-text">sigReports: Object {calculated, rst}</text>
  <text x="60" y="540" class="field-text">lastSeen: Date, checkedInAt: Date</text>
  <text x="60" y="555" class="index-text">Indexes: netProfile + callSign (compound unique)</text>
  <text x="60" y="570" class="validation-text">Note: Chat handled by GetStream, NOT stored here</text>

  <!-- TaskQueues Collection (Background Processing) -->
  <rect x="460" y="350" width="320" height="240" class="system-collection" />
  <text x="620" y="370" class="collection-title" text-anchor="middle">TaskQueues (Background Processing)</text>
  <text x="470" y="390" class="field-text">PendingUnfollow:</text>
  <text x="470" y="405" class="field-text">• unlink: String ["userOnly", "netOnly", "both"]</text>
  <text x="470" y="420" class="field-text">• upid: ObjectId → UserProfile (required)</text>
  <text x="470" y="435" class="field-text">• npid: ObjectId → NetProfile (required)</text>
  <text x="470" y="450" class="field-text">PendingAccountDelete:</text>
  <text x="470" y="465" class="field-text">• upid: ObjectId → UserProfile</text>
  <text x="470" y="480" class="field-text">Both include: createdAt, updatedAt</text>
  <text x="470" y="510" class="field-text">Note: User subscriptions handled via</text>
  <text x="470" y="525" class="field-text">following/followers arrays in UserProfile/NetProfile</text>
  <text x="470" y="555" class="index-text">Indexes: upid + npid (compound for processing)</text>
  <text x="470" y="570" class="validation-text">Validation: required references, enum constraints</text>

  <!-- System Collections (Bottom Row) -->

  <!-- QrzCache Collection -->
  <rect x="810" y="350" width="320" height="160" class="system-collection" />
  <text x="970" y="370" class="collection-title" text-anchor="middle">QrzCache (Callsign Lookup Cache)</text>
  <text x="820" y="390" class="field-text">_id: ObjectId</text>
  <text x="820" y="405" class="field-text">callSign: String (required, unique)</text>
  <text x="820" y="420" class="field-text">data: Object (QRZ response data)</text>
  <text x="820" y="435" class="field-text">cachedAt: Date</text>
  <text x="820" y="450" class="field-text">expiresAt: Date (TTL)</text>
  <text x="820" y="465" class="field-text">isValid: Boolean</text>
  <text x="820" y="480" class="index-text">Indexes: callSign (unique), expiresAt (TTL)</text>
  <text x="820" y="495" class="validation-text">Validation: callSign format, TTL expiration</text>

  <!-- PendingUnfollow Collection -->
  <rect x="1160" y="350" width="320" height="120" class="system-collection" />
  <text x="1320" y="370" class="collection-title" text-anchor="middle">PendingUnfollow (Background Tasks)</text>
  <text x="1170" y="390" class="field-text">_id: ObjectId</text>
  <text x="1170" y="405" class="field-text">unlink: String ["userOnly", "netOnly", "both"]</text>
  <text x="1170" y="420" class="field-text">upid: ObjectId → UserProfile (required)</text>
  <text x="1170" y="435" class="field-text">npid: ObjectId → NetProfile (required)</text>
  <text x="1170" y="450" class="index-text">Indexes: upid, npid</text>

  <!-- PendingAccountDelete Collection -->
  <rect x="1160" y="490" width="320" height="100" class="system-collection" />
  <text x="1320" y="510" class="collection-title" text-anchor="middle">PendingAccountDelete (Account Cleanup)</text>
  <text x="1170" y="530" class="field-text">_id: ObjectId</text>
  <text x="1170" y="545" class="field-text">upid: ObjectId → UserProfile (required)</text>
  <text x="1170" y="560" class="index-text">Indexes: upid</text>

  <!-- Relationships -->

  <!-- LiveNet → NetProfile -->
  <line x1="210" y1="135" x2="400" y2="135" class="relationship" />
  <text x="305" y="130" class="type-text" text-anchor="middle">netProfileId</text>

  <!-- NetProfile → UserProfile -->
  <text x="830" y="205" class="type-text" text-anchor="middle">createdBy</text>

  <!-- UserProfile relationships handled elsewhere -->

  <!-- StationInteraction → LiveNet -->
  <line x1="240" y1="405" x2="210" y2="320" class="relationship" />
  <text x="215" y="360" class="type-text" text-anchor="middle">liveNet</text>

  <!-- StationInteraction → UserProfile -->
  <line x1="430" y1="435" x2="750" y2="250" class="relationship" />
  <text x="590" y="342" class="type-text" text-anchor="middle">userProfile</text>

  <!-- UserProfile ↔ NetProfile (following/followers arrays) -->
  <line x1="620" y1="180" x2="680" y2="180" class="reference" />
  <text x="650" y="175" class="type-text" text-anchor="middle">following/followers</text>

  <line x1="480" y1="910" x2="530" y2="910" class="one-to-many" />
  <text x="540" y="915" class="type-text">One-to-Many Relationship</text>

  <text x="80" y="940" class="validation-text">Validation Rules: Field requirements, format validation, enum constraints</text>
  <text x="80" y="950" class="index-text">Index Strategy: Performance-optimized for common query patterns</text>

</svg>