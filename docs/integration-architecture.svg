<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font: bold 24px sans-serif;
        fill: #2d3748;
      }

      .section-title {
        font: bold 16px sans-serif;
        fill: #2d3748;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #4a5568;
      }

      .label {
        font: 12px sans-serif;
        fill: #2d3748;
      }

      .small-text {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .your-app-box {
        fill: #fed7d7;
        stroke: #e53e3e;
        stroke-width: 2;
        rx: 8;
      }

      .hamlive-box {
        fill: #c6f6d5;
        stroke: #38a169;
        stroke-width: 2;
        rx: 8;
      }

      .auth-box {
        fill: #bee3f8;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .data-box {
        fill: #faf089;
        stroke: #d69e2e;
        stroke-width: 2;
        rx: 8;
      }

      .realtime-box {
        fill: #e6fffa;
        stroke: #319795;
        stroke-width: 2;
        rx: 8;
      }

      .arrow {
        stroke: #4a5568;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }

      .bidirect-arrow {
        stroke: #4a5568;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
        marker-start: url(#arrowhead);
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#f7fafc" />

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="title">Ham.Live Integration Architecture</text>
  <text x="700" y="65" text-anchor="middle" class="subtitle">External Developer Integration Points</text>

  <!-- Your Application Section -->
  <text x="100" y="120" class="section-title">Your Application</text>
  <rect x="50" y="140" width="300" height="180" class="your-app-box" />
  <text x="200" y="165" text-anchor="middle" class="label">Web/Mobile App</text>

  <!-- Authentication Flow -->
  <rect x="70" y="180" width="120" height="40" class="auth-box" />
  <text x="130" y="205" text-anchor="middle" class="small-text">Auth Handler</text>

  <!-- API Client -->
  <rect x="210" y="180" width="120" height="40" class="data-box" />
  <text x="270" y="205" text-anchor="middle" class="small-text">API Client</text>

  <!-- Real-time Handler -->
  <rect x="70" y="240" width="120" height="40" class="realtime-box" />
  <text x="130" y="265" text-anchor="middle" class="small-text">SSE Handler</text>

  <!-- UI Components -->
  <rect x="210" y="240" width="120" height="40" class="your-app-box" />
  <text x="270" y="265" text-anchor="middle" class="small-text">UI Components</text>

  <!-- Ham.Live Platform Section -->
  <text x="550" y="120" class="section-title">Ham.Live Platform</text>
  <rect x="450" y="140" width="500" height="500" class="hamlive-box" />
  <text x="700" y="165" text-anchor="middle" class="label">www.ham.live API Services</text>

  <!-- Authentication Services -->
  <text x="470" y="195" class="subtitle">Authentication</text>
  <rect x="470" y="205" width="140" height="50" class="auth-box" />
  <text x="540" y="225" text-anchor="middle" class="small-text">Magic Link</text>
  <text x="540" y="240" text-anchor="middle" class="small-text">/auth/magiclogin</text>

  <rect x="630" y="205" width="140" height="50" class="auth-box" />
  <text x="700" y="225" text-anchor="middle" class="small-text">Google OAuth</text>
  <text x="700" y="240" text-anchor="middle" class="small-text">/auth/google</text>

  <!-- Core API Services -->
  <text x="470" y="285" class="subtitle">Core APIs</text>
  <rect x="470" y="295" width="130" height="60" class="data-box" />
  <text x="535" y="315" text-anchor="middle" class="small-text">LiveNet Data</text>
  <text x="535" y="330" text-anchor="middle" class="small-text">/api/data/livenets</text>
  <text x="535" y="345" text-anchor="middle" class="small-text">/api/presence</text>

  <rect x="620" y="295" width="130" height="60" class="data-box" />
  <text x="685" y="315" text-anchor="middle" class="small-text">User Data</text>
  <text x="685" y="330" text-anchor="middle" class="small-text">/api/data/netprofiles</text>
  <text x="685" y="345" text-anchor="middle" class="small-text">/api/data/userprofiles</text>

  <rect x="770" y="295" width="130" height="60" class="data-box" />
  <text x="835" y="315" text-anchor="middle" class="small-text">Interactions</text>
  <text x="835" y="330" text-anchor="middle" class="small-text">/api/station</text>
  <text x="835" y="345" text-anchor="middle" class="small-text">/api/data/follow</text>

  <!-- Real-time Services -->
  <text x="470" y="385" class="subtitle">Real-time</text>
  <rect x="470" y="395" width="200" height="50" class="realtime-box" />
  <text x="570" y="415" text-anchor="middle" class="small-text">Server-Sent Events</text>
  <text x="570" y="430" text-anchor="middle" class="small-text">/api/sse/livenets/:id</text>

  <!-- Integration Services -->
  <text x="470" y="475" class="subtitle">Integration Services</text>
  <rect x="470" y="485" width="120" height="50" class="data-box" />
  <text x="530" y="505" text-anchor="middle" class="small-text">Chat Endorsement</text>
  <text x="530" y="520" text-anchor="middle" class="small-text">/api/endorse/room_reg</text>

  <rect x="610" y="485" width="120" height="50" class="data-box" />
  <text x="670" y="505" text-anchor="middle" class="small-text">Upload Endorsement</text>
  <text x="670" y="520" text-anchor="middle" class="small-text">/api/endorse/uploader</text>

  <!-- Standard Response Format -->
  <text x="470" y="565" class="subtitle">Standard Response Format</text>
  <rect x="470" y="575" width="400" height="50" class="data-box" />
  <text x="670" y="595" text-anchor="middle" class="small-text">EndPointResponse Envelope</text>
  <text x="670" y="610" text-anchor="middle" class="small-text">{ endpointVersion, now, ttlMs, hash?, message }</text>

  <!-- External Services -->
  <text x="1100" y="120" class="section-title">External Services</text>

  <rect x="1050" y="200" width="150" height="60" class="auth-box" />
  <text x="1125" y="225" text-anchor="middle" class="label">Google OAuth</text>
  <text x="1125" y="245" text-anchor="middle" class="small-text">accounts.google.com</text>

  <rect x="1050" y="280" width="150" height="60" class="realtime-box" />
  <text x="1125" y="305" text-anchor="middle" class="label">Chat Services</text>
  <text x="1125" y="325" text-anchor="middle" class="small-text">GetStream</text>

  <rect x="1050" y="360" width="150" height="60" class="data-box" />
  <text x="1125" y="385" text-anchor="middle" class="label">File Upload</text>
  <text x="1125" y="405" text-anchor="middle" class="small-text">SendGrid</text>

  <!-- Flow Arrows -->

  <!-- Auth flows -->
  <line x1="190" y1="200" x2="450" y2="230" class="arrow" />
  <text x="320" y="210" class="small-text">1. Auth Request</text>

  <!-- Google OAuth flow -->
  <line x1="770" y1="225" x2="1050" y2="225" class="arrow" />
  <text x="900" y="220" class="small-text">OAuth Flow</text>

  <!-- API calls -->
  <line x1="330" y1="200" x2="470" y2="325" class="bidirect-arrow" />
  <text x="380" y="270" class="small-text">API Calls</text>

  <!-- SSE connection -->
  <line x1="190" y1="260" x2="470" y2="420" class="arrow" />
  <text x="320" y="340" class="small-text">SSE Connection</text>

  <!-- Integration services -->
  <line x1="900" y1="510" x2="1050" y2="390" class="arrow" />
  <text x="970" y="450" class="small-text">Endorsements</text>

  <!-- Key Integration Points -->
  <text x="100" y="750" class="section-title">Key Integration Points</text>

  <rect x="50" y="770" width="320" height="200" class="your-app-box" />
  <text x="70" y="795" class="label">1. Authentication Flow</text>
  <text x="70" y="815" class="small-text">• Magic-link or Google OAuth</text>
  <text x="70" y="830" class="small-text">• Session cookies for subsequent requests</text>
  <text x="70" y="845" class="small-text">• CORS with credentials: include</text>

  <text x="70" y="870" class="label">2. API Integration</text>
  <text x="70" y="890" class="small-text">• EndPointResponse envelope format</text>
  <text x="70" y="905" class="small-text">• Respect ttlMs for caching</text>
  <text x="70" y="920" class="small-text">• Handle endpointVersion compatibility</text>

  <text x="70" y="945" class="label">3. Real-time Updates</text>
  <text x="70" y="960" class="small-text">• Server-Sent Events for live data</text>

  <rect x="400" y="770" width="320" height="200" class="hamlive-box" />
  <text x="420" y="795" class="label">Response Format Example</text>
  <text x="420" y="820" class="small-text" style="font-family: monospace;">{</text>
  <text x="420" y="835" class="small-text" style="font-family: monospace;"> "endpointVersion": "1.0",</text>
  <text x="420" y="850" class="small-text" style="font-family: monospace;"> "now": 1590000000000,</text>
  <text x="420" y="865" class="small-text" style="font-family: monospace;"> "ttlMs": 3000,</text>
  <text x="420" y="880" class="small-text" style="font-family: monospace;"> "hash": "optional-cache-key",</text>
  <text x="420" y="895" class="small-text" style="font-family: monospace;"> "message": {</text>
  <text x="420" y="910" class="small-text" style="font-family: monospace;"> /* endpoint payload */</text>
  <text x="420" y="925" class="small-text" style="font-family: monospace;"> }</text>
  <text x="420" y="940" class="small-text" style="font-family: monospace;">}</text>

  <rect x="750" y="770" width="320" height="200" class="data-box" />
  <text x="770" y="795" class="label">Common Endpoints</text>
  <text x="770" y="820" class="small-text">GET /api/data/livenets - List active nets</text>
  <text x="770" y="835" class="small-text">GET /api/data/livenets/:id - Net details</text>
  <text x="770" y="850" class="small-text">GET /api/presence/livenets/:id - Presence</text>
  <text x="770" y="865" class="small-text">POST /api/station/interactions - Interactions</text>
  <text x="770" y="880" class="small-text">GET /api/sse/livenets/:id - Real-time SSE</text>

  <text x="770" y="910" class="label">Authentication Endpoints</text>
  <text x="770" y="930" class="small-text">POST /auth/magiclogin - Request magic link</text>
  <text x="770" y="945" class="small-text">GET /auth/google - Start OAuth flow</text>

</svg>