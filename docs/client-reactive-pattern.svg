<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .title {
        font: bold 18px sans-serif;
        fill: #2d3748;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #4a5568;
      }

      .box {
        fill: #e2e8f0;
        stroke: #4a5568;
        stroke-width: 2;
        rx: 8;
      }

      .store-box {
        fill: #bee3f8;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .widget-box {
        fill: #c6f6d5;
        stroke: #38a169;
        stroke-width: 2;
        rx: 8;
      }

      .client-box {
        fill: #fed7d7;
        stroke: #e53e3e;
        stroke-width: 2;
        rx: 8;
      }

      .helper-box {
        fill: #faf089;
        stroke: #d69e2e;
        stroke-width: 2;
        rx: 8;
      }

      .arrow {
        fill: none;
        stroke: #2d3748;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .data-arrow {
        fill: none;
        stroke: #3182ce;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .action-arrow {
        fill: none;
        stroke: #38a169;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .step-text {
        font: 12px sans-serif;
        fill: #2d3748;
      }

      .flow-text {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .label-text {
        font: 11px sans-serif;
        fill: #2d3748;
        font-weight: bold;
      }
    </style>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
      </marker>
    </defs>
  </defs>

  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle">Ham.Live Client Framework - Reactive Pattern</text>
  <text x="600" y="50" class="subtitle" text-anchor="middle">Per-view initialization → Store-driven state → Widget reactivity</text>

  <!-- Phase 1: Initialization -->
  <text x="50" y="90" class="label-text">1. Per-View Initialization (/js/byView/*/main.js)</text>

  <rect x="50" y="110" width="140" height="80" class="box" />
  <text x="120" y="130" class="step-text" text-anchor="middle">EJS View</text>
  <text x="120" y="145" class="step-text" text-anchor="middle">loads ESM</text>
  <text x="120" y="160" class="step-text" text-anchor="middle">main.js</text>
  <text x="120" y="175" class="flow-text" text-anchor="middle">serverInfo injected</text>

  <rect x="250" y="110" width="140" height="80" class="helper-box" />
  <text x="320" y="130" class="step-text" text-anchor="middle">Presence</text>
  <text x="320" y="145" class="step-text" text-anchor="middle">Helper</text>
  <text x="320" y="160" class="flow-text" text-anchor="middle">creates EndPointClient</text>
  <text x="320" y="175" class="flow-text" text-anchor="middle">starts polling</text>

  <rect x="450" y="110" width="140" height="80" class="client-box" />
  <text x="520" y="130" class="step-text" text-anchor="middle">EndPointClient</text>
  <text x="520" y="145" class="step-text" text-anchor="middle">instances</text>
  <text x="520" y="160" class="flow-text" text-anchor="middle">HTTP wrappers</text>
  <text x="520" y="175" class="flow-text" text-anchor="middle">API calls</text>

  <!-- Initialization arrows -->
  <line x1="190" y1="150" x2="240" y2="150" class="arrow" />
  <text x="215" y="145" class="flow-text" text-anchor="middle">creates</text>

  <line x1="390" y1="150" x2="440" y2="150" class="arrow" />
  <text x="415" y="145" class="flow-text" text-anchor="middle">creates</text>

  <!-- Phase 2: Store Setup -->
  <text x="50" y="240" class="label-text">2. ReactiveStore Setup (Single Source of Truth)</text>

  <rect x="50" y="260" width="180" height="100" class="store-box" />
  <text x="140" y="280" class="step-text" text-anchor="middle">LiveNetReactiveStore</text>
  <text x="140" y="295" class="flow-text" text-anchor="middle">• subscribe/unsubscribe</text>
  <text x="140" y="310" class="flow-text" text-anchor="middle">• ingestServerResponse</text>
  <text x="140" y="325" class="flow-text" text-anchor="middle">• optimisticUpdate</text>
  <text x="140" y="340" class="flow-text" text-anchor="middle">• mainCache (state)</text>

  <rect x="280" y="260" width="150" height="100" class="helper-box" />
  <text x="355" y="280" class="step-text" text-anchor="middle">InFlightWindowManager</text>
  <text x="355" y="295" class="flow-text" text-anchor="middle">• RTT measurement</text>
  <text x="355" y="310" class="flow-text" text-anchor="middle">• optimistic windows</text>
  <text x="355" y="325" class="flow-text" text-anchor="middle">• confirmation tracking</text>
  <text x="355" y="340" class="flow-text" text-anchor="middle">• reconciliation</text>

  <rect x="480" y="260" width="150" height="100" class="helper-box" />
  <text x="555" y="280" class="step-text" text-anchor="middle">StationIndexer</text>
  <text x="555" y="295" class="flow-text" text-anchor="middle">• efficient diffs</text>
  <text x="555" y="310" class="flow-text" text-anchor="middle">• callSign maps</text>
  <text x="555" y="325" class="flow-text" text-anchor="middle">• granular updates</text>
  <text x="555" y="340" class="flow-text" text-anchor="middle">• change detection</text>

  <rect x="680" y="260" width="140" height="100" class="helper-box" />
  <text x="750" y="280" class="step-text" text-anchor="middle">Looper</text>
  <text x="750" y="295" class="flow-text" text-anchor="middle">• drift compensation</text>
  <text x="750" y="310" class="flow-text" text-anchor="middle">• stop/start</text>
  <text x="750" y="325" class="flow-text" text-anchor="middle">• backoff/retry</text>
  <text x="750" y="340" class="flow-text" text-anchor="middle">• scheduling</text>

  <!-- Store connections -->
  <line x1="230" y1="310" x2="270" y2="310" class="arrow" />
  <line x1="430" y1="310" x2="470" y2="310" class="arrow" />
  <line x1="630" y1="310" x2="670" y2="310" class="arrow" />

  <!-- Phase 3: Data Flow -->
  <text x="50" y="410" class="label-text">3. Data Flow (Server → Store → Widgets)</text>

  <rect x="50" y="430" width="140" height="80" class="box" />
  <text x="120" y="450" class="step-text" text-anchor="middle">Server API</text>
  <text x="120" y="465" class="step-text" text-anchor="middle">/api/data/*</text>
  <text x="120" y="480" class="step-text" text-anchor="middle">/api/sse/*</text>
  <text x="120" y="495" class="flow-text" text-anchor="middle">EndPointResponse</text>

  <rect x="250" y="430" width="140" height="80" class="store-box" />
  <text x="320" y="450" class="step-text" text-anchor="middle">Store</text>
  <text x="320" y="465" class="step-text" text-anchor="middle">ingestServerResponse</text>
  <text x="320" y="480" class="flow-text" text-anchor="middle">merge diffs</text>
  <text x="320" y="495" class="flow-text" text-anchor="middle">broadcast changes</text>

  <rect x="450" y="430" width="140" height="80" class="widget-box" />
  <text x="520" y="450" class="step-text" text-anchor="middle">Widgets</text>
  <text x="520" y="465" class="step-text" text-anchor="middle">subscribe callbacks</text>
  <text x="520" y="480" class="flow-text" text-anchor="middle">re-render on change</text>
  <text x="520" y="495" class="flow-text" text-anchor="middle">Shadow DOM</text>

  <!-- Data flow arrows -->
  <line x1="190" y1="470" x2="240" y2="470" class="data-arrow" />
  <text x="215" y="465" class="flow-text" text-anchor="middle">SSE/Poll</text>

  <line x1="390" y1="470" x2="440" y2="470" class="data-arrow" />
  <text x="415" y="465" class="flow-text" text-anchor="middle">newData</text>

  <!-- Phase 4: User Actions -->
  <text x="50" y="560" class="label-text">4. User Actions (Widgets → Optimistic → Server)</text>

  <rect x="50" y="580" width="140" height="80" class="widget-box" />
  <text x="120" y="600" class="step-text" text-anchor="middle">Widget</text>
  <text x="120" y="615" class="step-text" text-anchor="middle">User Action</text>
  <text x="120" y="630" class="flow-text" text-anchor="middle">click/input</text>
  <text x="120" y="645" class="flow-text" text-anchor="middle">emit action</text>

  <rect x="250" y="580" width="140" height="80" class="store-box" />
  <text x="320" y="600" class="step-text" text-anchor="middle">Store</text>
  <text x="320" y="615" class="step-text" text-anchor="middle">optimisticUpdate</text>
  <text x="320" y="630" class="flow-text" text-anchor="middle">apply locally</text>
  <text x="320" y="645" class="flow-text" text-anchor="middle">register in-flight</text>

  <rect x="450" y="580" width="140" height="80" class="client-box" />
  <text x="520" y="600" class="step-text" text-anchor="middle">EndPointClient</text>
  <text x="520" y="615" class="step-text" text-anchor="middle">HTTP POST</text>
  <text x="520" y="630" class="flow-text" text-anchor="middle">to server API</text>
  <text x="520" y="645" class="flow-text" text-anchor="middle">await confirmation</text>

  <rect x="650" y="580" width="140" height="80" class="box" />
  <text x="720" y="600" class="step-text" text-anchor="middle">Server</text>
  <text x="720" y="615" class="step-text" text-anchor="middle">Process + SSE</text>
  <text x="720" y="630" class="flow-text" text-anchor="middle">update database</text>
  <text x="720" y="645" class="flow-text" text-anchor="middle">broadcast changes</text>

  <!-- Action flow arrows -->
  <line x1="190" y1="620" x2="240" y2="620" class="action-arrow" />
  <text x="215" y="615" class="flow-text" text-anchor="middle">calls</text>

  <line x1="390" y1="620" x2="440" y2="620" class="action-arrow" />
  <text x="415" y="615" class="flow-text" text-anchor="middle">HTTP call</text>

  <line x1="590" y1="620" x2="640" y2="620" class="action-arrow" />
  <text x="615" y="615" class="flow-text" text-anchor="middle">request</text>

  <!-- Confirmation loop -->
  <path d="M 720 580 Q 900 500 320 430" class="data-arrow" fill="none" />
  <text x="620" y="520" class="flow-text" text-anchor="middle">SSE confirmation</text>
  <text x="620" y="535" class="flow-text" text-anchor="middle">reconciles optimistic</text>

  <!-- Widget Types -->
  <text x="870" y="430" class="label-text">Widget Examples:</text>
  <rect x="870" y="450" width="280" height="120" class="widget-box" />
  <text x="880" y="470" class="flow-text">• StationTable - displays station list</text>
  <text x="880" y="485" class="flow-text">• FavoriteInsert - manages favorite actions</text>
  <text x="880" y="500" class="flow-text">• NetControl* - admin controls</text>
  <text x="880" y="515" class="flow-text">• All extend HamLiveElement base class</text>
  <text x="880" y="530" class="flow-text">• Shadow DOM + adopted stylesheets</text>
  <text x="880" y="545" class="flow-text">• Connect/disconnect lifecycle</text>
  <text x="880" y="560" class="flow-text">• Subscribe to store in connectedCallback</text>

  <!-- Legend -->
  <text x="870" y="600" class="label-text">Legend:</text>
  <rect x="870" y="610" width="25" height="15" class="store-box" />
  <text x="900" y="622" class="flow-text">Reactive Stores</text>

  <rect x="870" y="630" width="25" height="15" class="widget-box" />
  <text x="900" y="642" class="flow-text">Widgets (Custom Elements)</text>

  <rect x="870" y="650" width="25" height="15" class="client-box" />
  <text x="900" y="662" class="flow-text">HTTP Clients</text>

  <rect x="870" y="670" width="25" height="15" class="helper-box" />
  <text x="900" y="682" class="flow-text">Helper Services</text>

  <rect x="1020" y="610" width="25" height="15" class="box" />
  <text x="1050" y="622" class="flow-text">Server/Views</text>

  <line x1="1020" y1="635" x2="1045" y2="635" class="data-arrow" />
  <text x="1050" y="639" class="flow-text">Data Flow</text>

  <line x1="1020" y1="655" x2="1045" y2="655" class="action-arrow" />
  <text x="1050" y="659" class="flow-text">User Actions</text>

</svg>