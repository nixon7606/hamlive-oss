<?xml version="1.0" encoding="UTF-8"?>
<svg width="1250" height="910" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font: bold 18px sans-serif;
        fill: #2d3748;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #4a5568;
      }

      .section-title {
        font: bold 14px sans-serif;
        fill: #2d3748;
      }

      .step-text {
        font: 12px sans-serif;
        fill: #2d3748;
      }

      .flow-text {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .code-text {
        font: 9px monospace;
        fill: #2d3748;
      }

      .user-box {
        fill: #e6fffa;
        stroke: #319795;
        stroke-width: 2;
        rx: 8;
      }

      .server-box {
        fill: #ebf8ff;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .external-box {
        fill: #c6f6d5;
        stroke: #38a169;
        stroke-width: 2;
        rx: 8;
      }

      .magic-box {
        fill: #fed7d7;
        stroke: #e53e3e;
        stroke-width: 2;
        rx: 8;
      }

      .oauth-box {
        fill: #faf089;
        stroke: #d69e2e;
        stroke-width: 2;
        rx: 8;
      }

      .session-box {
        fill: #faf5ff;
        stroke: #805ad5;
        stroke-width: 2;
        rx: 8;
      }

      .arrow {
        fill: none;
        stroke: #2d3748;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .magic-arrow {
        fill: none;
        stroke: #e53e3e;
        stroke-width: 2;
        marker-end: url(#redarrow);
      }

      .oauth-arrow {
        fill: none;
        stroke: #d69e2e;
        stroke-width: 2;
        marker-end: url(#yellowarrow);
      }

      .session-arrow {
        fill: none;
        stroke: #805ad5;
        stroke-width: 2;
        marker-end: url(#purplearrow);
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
    <marker id="redarrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e" />
    </marker>
    <marker id="yellowarrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d69e2e" />
    </marker>
    <marker id="purplearrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#805ad5" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle">Ham.Live Complete Authentication System</text>
  <text x="600" y="50" class="subtitle" text-anchor="middle">Magic Link + Google OAuth + Session Management + External Developer API</text>

  <!-- Magic Link Flow -->
  <text x="50" y="90" class="section-title">Magic Link Authentication (Primary User Flow)</text>

  <!-- Client Browser -->
  <rect x="50" y="110" width="140" height="70" class="user-box" />
  <text x="120" y="135" class="step-text" text-anchor="middle">Client Browser</text>
  <text x="120" y="155" class="flow-text" text-anchor="middle">User enters callsign</text>
  <text x="120" y="170" class="flow-text" text-anchor="middle">Clicks "Send Magic Link"</text>

  <!-- Ham.Live Server -->
  <rect x="220" y="110" width="140" height="70" class="server-box" />
  <text x="290" y="135" class="step-text" text-anchor="middle">Ham.Live Server</text>
  <text x="290" y="155" class="flow-text" text-anchor="middle">Validates callsign</text>
  <text x="290" y="170" class="flow-text" text-anchor="middle">Generates secure token</text>

  <!-- Email Service -->
  <rect x="390" y="110" width="140" height="70" class="external-box" />
  <text x="460" y="135" class="step-text" text-anchor="middle">Email Service</text>
  <text x="460" y="155" class="flow-text" text-anchor="middle">SendGrid/SMTP</text>
  <text x="460" y="170" class="flow-text" text-anchor="middle">Delivers magic link</text>

  <!-- User Email -->
  <rect x="560" y="110" width="140" height="70" class="user-box" />
  <text x="630" y="135" class="step-text" text-anchor="middle">User Email</text>
  <text x="630" y="155" class="flow-text" text-anchor="middle">Receives link</text>
  <text x="630" y="170" class="flow-text" text-anchor="middle">Clicks to authenticate</text>

  <!-- Magic Link Steps -->
  <line x1="190" y1="145" x2="220" y2="145" class="magic-arrow" />
  <text x="205" y="135" class="flow-text" text-anchor="middle">POST</text>
  <text x="205" y="158" class="code-text" text-anchor="middle">/api/auth/magic</text>

  <line x1="360" y1="145" x2="390" y2="145" class="magic-arrow" />
  <text x="375" y="135" class="flow-text" text-anchor="middle">Send</text>
  <text x="375" y="158" class="flow-text" text-anchor="middle">magic link</text>

  <line x1="530" y1="145" x2="560" y2="145" class="magic-arrow" />
  <text x="545" y="135" class="flow-text" text-anchor="middle">Email</text>
  <text x="545" y="158" class="flow-text" text-anchor="middle">delivered</text>

  <path d="M 630 190 Q 500 220 290 200" class="magic-arrow" fill="none" />
  <text x="460" y="215" class="flow-text" text-anchor="middle">4. User clicks magic link → GET /api/auth/verify/:token</text>

  <!-- Google OAuth Flow -->
  <text x="50" y="270" class="section-title">Google OAuth Flow (External Developers)</text>

  <!-- OAuth components -->
  <rect x="50" y="290" width="140" height="70" class="oauth-box" />
  <text x="120" y="315" class="step-text" text-anchor="middle">External App</text>
  <text x="120" y="335" class="flow-text" text-anchor="middle">Third-party client</text>
  <text x="120" y="350" class="flow-text" text-anchor="middle">Needs API access</text>

  <rect x="220" y="290" width="140" height="70" class="server-box" />
  <text x="290" y="315" class="step-text" text-anchor="middle">Ham.Live OAuth</text>
  <text x="290" y="335" class="flow-text" text-anchor="middle">Passport.js + Google</text>
  <text x="290" y="350" class="flow-text" text-anchor="middle">Strategy</text>

  <rect x="390" y="290" width="140" height="70" class="external-box" />
  <text x="460" y="315" class="step-text" text-anchor="middle">Google OAuth</text>
  <text x="460" y="335" class="flow-text" text-anchor="middle">Identity Provider</text>
  <text x="460" y="350" class="flow-text" text-anchor="middle">User consent</text>

  <rect x="560" y="290" width="140" height="70" class="oauth-box" />
  <text x="630" y="315" class="step-text" text-anchor="middle">API Token</text>
  <text x="630" y="335" class="flow-text" text-anchor="middle">JWT or session</text>
  <text x="630" y="350" class="flow-text" text-anchor="middle">API access granted</text>

  <!-- OAuth Steps -->
  <line x1="190" y1="325" x2="220" y2="325" class="oauth-arrow" />
  <text x="205" y="315" class="flow-text" text-anchor="middle">GET</text>
  <text x="205" y="338" class="code-text" text-anchor="middle">/auth/google</text>

  <line x1="360" y1="325" x2="390" y2="325" class="oauth-arrow" />
  <text x="375" y="315" class="flow-text" text-anchor="middle">Redirect to</text>
  <text x="375" y="338" class="flow-text" text-anchor="middle">Google OAuth</text>

  <line x1="530" y1="325" x2="560" y2="325" class="oauth-arrow" />
  <text x="545" y="315" class="flow-text" text-anchor="middle">Callback</text>
  <text x="545" y="338" class="code-text" text-anchor="middle">/auth/google/callback</text>

  <!-- Session Management -->
  <text x="50" y="420" class="section-title">Session Management &amp; Persistence</text>

  <rect x="50" y="440" width="200" height="100" class="session-box" />
  <text x="150" y="465" class="step-text" text-anchor="middle">Cookie-based Sessions</text>
  <text x="60" y="485" class="flow-text">• cookieSession middleware</text>
  <text x="60" y="500" class="flow-text">• 3.5 day expiration</text>
  <text x="60" y="515" class="flow-text">• Auto-renewal every 10 minutes</text>
  <text x="60" y="530" class="flow-text">• Secure, httpOnly, sameSite</text>

  <rect x="280" y="440" width="220" height="100" class="session-box" />
  <text x="390" y="465" class="step-text" text-anchor="middle">Passport.js Integration</text>
  <text x="290" y="485" class="flow-text">• User serialization/deserialization</text>
  <text x="290" y="500" class="flow-text">• UserProfile lookup from MongoDB</text>
  <text x="290" y="515" class="flow-text">• Role-based permissions</text>
  <text x="290" y="530" class="flow-text">• Session invalidation on logout</text>

  <rect x="510" y="440" width="220" height="100" class="session-box" />
  <text x="620" y="465" class="step-text" text-anchor="middle">Security Features</text>
  <text x="520" y="485" class="flow-text">• CSRF protection</text>
  <text x="520" y="500" class="flow-text">• Rate limiting on auth endpoints</text>
  <text x="520" y="515" class="flow-text">• Token expiration (magic links)</text>
  <text x="520" y="530" class="flow-text">• Secure session keys rotation</text>

  <!-- API Authentication -->
  <text x="50" y="590" class="section-title">API Authentication &amp; Authorization</text>

  <rect x="50" y="610" width="220" height="120" class="server-box" />
  <text x="160" y="635" class="step-text" text-anchor="middle">Middleware Stack</text>
  <text x="60" y="655" class="flow-text">1. Session validation</text>
  <text x="60" y="670" class="flow-text">2. User profile lookup</text>
  <text x="60" y="685" class="flow-text">3. Role permission check</text>
  <text x="60" y="700" class="flow-text">4. FlexOptions injection</text>
  <text x="60" y="715" class="flow-text">5. Request context preparation</text>

  <rect x="300" y="610" width="240" height="120" class="server-box" />
  <text x="420" y="635" class="step-text" text-anchor="middle">Role Hierarchy</text>
  <text x="310" y="655" class="flow-text">• netcontrol (highest permissions)</text>
  <text x="310" y="670" class="flow-text">• netlogger (logging, interactions)</text>
  <text x="310" y="685" class="flow-text">• netrelay (basic net participation)</text>
  <text x="310" y="700" class="flow-text">• netuser (read-only, favorites)</text>
  <text x="310" y="715" class="flow-text">• guest (public content only)</text>

  <rect x="570" y="610" width="240" height="120" class="external-box" />
  <text x="690" y="635" class="step-text" text-anchor="middle">External API Access</text>
  <text x="580" y="655" class="flow-text">• HMAC signature validation</text>
  <text x="580" y="670" class="code-text">/api/endorse/* endpoints</text>
  <text x="580" y="685" class="flow-text">• Third-party service integration</text>
  <text x="580" y="700" class="flow-text">• QRZ.com, GetStream, SendGrid</text>
  <text x="580" y="715" class="flow-text">• secureSign.js for validation</text>

  <!-- Error Handling &amp; Edge Cases -->
  <text x="50" y="780" class="section-title">Error Handling &amp; Edge Cases</text>

  <rect x="50" y="800" width="180" height="80" class="magic-box" />
  <text x="140" y="825" class="step-text" text-anchor="middle">Magic Link Failures</text>
  <text x="60" y="845" class="flow-text">• Token expiration (15 min)</text>
  <text x="60" y="860" class="flow-text">• Invalid/malformed tokens</text>
  <text x="60" y="875" class="flow-text">• Email delivery failures</text>

  <rect x="250" y="800" width="180" height="80" class="oauth-box" />
  <text x="340" y="825" class="step-text" text-anchor="middle">OAuth Failures</text>
  <text x="260" y="845" class="flow-text">• User denies permission</text>
  <text x="260" y="860" class="flow-text">• Invalid redirect URIs</text>
  <text x="260" y="875" class="flow-text">• Google service outages</text>

  <rect x="450" y="800" width="200" height="80" class="session-box" />
  <text x="550" y="825" class="step-text" text-anchor="middle">Session Issues</text>
  <text x="460" y="845" class="flow-text">• Session hijacking protection</text>
  <text x="460" y="860" class="flow-text">• Concurrent session limits</text>
  <text x="460" y="875" class="flow-text">• Graceful session expiration</text>

  <rect x="670" y="800" width="200" height="80" class="external-box" />
  <text x="770" y="825" class="step-text" text-anchor="middle">Recovery Mechanisms</text>
  <text x="680" y="845" class="flow-text">• Automatic retry logic</text>
  <text x="680" y="860" class="flow-text">• Fallback authentication</text>
  <text x="680" y="875" class="flow-text">• Admin manual verification</text>

  <!-- Legend -->
  <rect x="890" y="110" width="340" height="300" class="session-box" />
  <text x="1060" y="135" class="section-title" text-anchor="middle">Authentication Flow Legend</text>

  <text x="900" y="160" class="step-text">Flow Types:</text>
  <line x1="900" y1="175" x2="940" y2="175" class="magic-arrow" />
  <text x="950" y="180" class="flow-text">Magic Link Flow</text>
  <line x1="900" y1="195" x2="940" y2="195" class="oauth-arrow" />
  <text x="950" y="200" class="flow-text">OAuth Flow</text>
  <line x1="900" y1="215" x2="940" y2="215" class="session-arrow" />
  <text x="950" y="220" class="flow-text">Session Management</text>

  <text x="900" y="245" class="step-text">Component Types:</text>
  <rect x="900" y="255" width="40" height="15" class="user-box" />
  <text x="950" y="267" class="flow-text">User-facing</text>
  <rect x="900" y="275" width="40" height="15" class="server-box" />
  <text x="950" y="287" class="flow-text">Ham.Live Server</text>
  <rect x="900" y="295" width="40" height="15" class="external-box" />
  <text x="950" y="307" class="flow-text">External Service</text>

  <text x="900" y="330" class="step-text">Key Endpoints:</text>
  <text x="900" y="350" class="code-text">POST /api/auth/magic</text>
  <text x="900" y="365" class="code-text">GET /api/auth/verify/:token</text>
  <text x="900" y="380" class="code-text">GET /auth/google</text>
  <text x="900" y="395" class="code-text">GET /auth/google/callback</text>

</svg>