<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title {
        font: bold 18px sans-serif;
        fill: #2d3748;
      }

      .subtitle {
        font: 14px sans-serif;
        fill: #4a5568;
      }

      .box {
        fill: #e2e8f0;
        stroke: #4a5568;
        stroke-width: 2;
        rx: 8;
      }

      .client-box {
        fill: #fed7d7;
        stroke: #e53e3e;
        stroke-width: 2;
        rx: 8;
      }

      .server-box {
        fill: #bee3f8;
        stroke: #3182ce;
        stroke-width: 2;
        rx: 8;
      }

      .endpoint-box {
        fill: #c6f6d5;
        stroke: #38a169;
        stroke-width: 2;
        rx: 8;
      }

      .response-box {
        fill: #faf089;
        stroke: #d69e2e;
        stroke-width: 2;
        rx: 8;
      }

      .arrow {
        fill: none;
        stroke: #2d3748;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .data-arrow {
        fill: none;
        stroke: #3182ce;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .sse-arrow {
        fill: none;
        stroke: #38a169;
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .step-text {
        font: 12px sans-serif;
        fill: #2d3748;
      }

      .flow-text {
        font: 10px sans-serif;
        fill: #4a5568;
      }

      .label-text {
        font: 11px sans-serif;
        fill: #2d3748;
        font-weight: bold;
      }

      .code-text {
        font: 9px monospace;
        fill: #4a5568;
      }
    </style>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
      </marker>
    </defs>
  </defs>

  <!-- Title -->
  <text x="600" y="30" class="title" text-anchor="middle">Ham.Live API Request/Response Flow</text>
  <text x="600" y="50" class="subtitle" text-anchor="middle">EndPointResponse Envelope + SSE vs Polling Patterns</text>

  <!-- Client Request Flow -->
  <text x="50" y="90" class="label-text">1. Client Request Flow</text>

  <rect x="50" y="110" width="150" height="80" class="client-box" />
  <text x="125" y="130" class="step-text" text-anchor="middle">Client Widget</text>
  <text x="125" y="145" class="step-text" text-anchor="middle">or Store</text>
  <text x="125" y="160" class="flow-text" text-anchor="middle">EndPointClient.get()</text>
  <text x="125" y="175" class="flow-text" text-anchor="middle">InteractionClient.post()</text>

  <rect x="250" y="110" width="150" height="80" class="client-box" />
  <text x="325" y="130" class="step-text" text-anchor="middle">HTTP Request</text>
  <text x="325" y="145" class="flow-text" text-anchor="middle">GET /api/data/livenets</text>
  <text x="325" y="160" class="flow-text" text-anchor="middle">POST /api/interactions/*</text>
  <text x="325" y="175" class="flow-text" text-anchor="middle">+ Session Cookie</text>

  <rect x="450" y="110" width="150" height="80" class="server-box" />
  <text x="525" y="130" class="step-text" text-anchor="middle">Express Server</text>
  <text x="525" y="145" class="flow-text" text-anchor="middle">Route Handler</text>
  <text x="525" y="160" class="flow-text" text-anchor="middle">Controller Logic</text>
  <text x="525" y="175" class="flow-text" text-anchor="middle">sharedNetOps</text>

  <line x1="200" y1="150" x2="240" y2="150" class="arrow" />
  <line x1="400" y1="150" x2="440" y2="150" class="arrow" />

  <!-- EndPointResponse Structure -->
  <text x="50" y="230" class="label-text">2. EndPointResponse Envelope (Standard Response Format)</text>

  <rect x="50" y="250" width="550" height="200" class="response-box" />
  <text x="325" y="270" class="step-text" text-anchor="middle">EndPointResponse Structure</text>

  <text x="60" y="295" class="code-text">{</text>
  <text x="70" y="310" class="code-text">"endpointVersion": "1.0",</text>
  <text x="70" y="325" class="code-text">"now": 1590000000000,</text>
  <text x="70" y="340" class="code-text">"ttlMs": 3000,</text>
  <text x="70" y="355" class="code-text">"ssePath"?: "/api/sse/livenets/123",</text>
  <text x="70" y="370" class="code-text">"hash"?: "abc123...",</text>
  <text x="70" y="385" class="code-text">"servedFromCache"?: true,</text>
  <text x="70" y="400" class="code-text">"errorMessage"?: "Authentication required",</text>
  <text x="70" y="415" class="code-text">"message": { /* endpoint-specific payload */ }</text>
  <text x="60" y="430" class="code-text">}</text>

  <text x="350" y="295" class="flow-text">• Consistent envelope across all endpoints</text>
  <text x="350" y="310" class="flow-text">• ttlMs guides client caching/polling intervals</text>
  <text x="350" y="325" class="flow-text">• ssePath indicates SSE availability</text>
  <text x="350" y="340" class="flow-text">• hash enables response validation</text>
  <text x="350" y="355" class="flow-text">• message contains actual data payload</text>
  <text x="350" y="370" class="flow-text">• errorMessage for standardized error handling</text>
  <text x="350" y="385" class="flow-text">• now provides server timestamp</text>
  <text x="350" y="400" class="flow-text">• Used by stores for ingestServerResponse()</text>

  <!-- Data Retrieval Patterns -->
  <text x="650" y="230" class="label-text">3. Data Retrieval Patterns</text>

  <!-- SSE Pattern -->
  <rect x="650" y="250" width="200" height="100" class="endpoint-box" />
  <text x="750" y="270" class="step-text" text-anchor="middle">SSE Pattern</text>
  <text x="750" y="285" class="step-text" text-anchor="middle">(Preferred)</text>
  <text x="660" y="305" class="flow-text">1. Initial request returns ssePath</text>
  <text x="660" y="320" class="flow-text">2. Client opens EventSource</text>
  <text x="660" y="335" class="flow-text">3. Real-time updates pushed</text>

  <!-- Polling Pattern -->
  <rect x="900" y="250" width="200" height="100" class="endpoint-box" />
  <text x="1000" y="270" class="step-text" text-anchor="middle">Polling Pattern</text>
  <text x="1000" y="285" class="step-text" text-anchor="middle">(Fallback)</text>
  <text x="910" y="305" class="flow-text">1. No ssePath in response</text>
  <text x="910" y="320" class="flow-text">2. Looper schedules next poll</text>
  <text x="910" y="335" class="flow-text">3. Uses ttlMs for timing</text>

  <!-- Detailed Flow Diagrams -->
  <text x="50" y="490" class="label-text">4. SSE Flow (Real-time Updates)</text>

  <rect x="50" y="510" width="120" height="60" class="client-box" />
  <text x="110" y="535" class="step-text" text-anchor="middle">ReactiveStore</text>
  <text x="110" y="550" class="flow-text" text-anchor="middle">init()</text>

  <rect x="200" y="510" width="120" height="60" class="server-box" />
  <text x="260" y="535" class="step-text" text-anchor="middle">Data Endpoint</text>
  <text x="260" y="550" class="flow-text" text-anchor="middle">/api/data/livenets</text>

  <rect x="350" y="510" width="120" height="60" class="endpoint-box" />
  <text x="410" y="535" class="step-text" text-anchor="middle">SSE Endpoint</text>
  <text x="410" y="550" class="flow-text" text-anchor="middle">/api/sse/livenets/:id</text>

  <rect x="500" y="510" width="120" height="60" class="server-box" />
  <text x="560" y="535" class="step-text" text-anchor="middle">RealtimeClients</text>
  <text x="560" y="550" class="flow-text" text-anchor="middle">Manager</text>

  <line x1="170" y1="540" x2="190" y2="540" class="data-arrow" />
  <text x="180" y="535" class="flow-text" text-anchor="middle">1</text>

  <line x1="320" y1="540" x2="340" y2="540" class="sse-arrow" />
  <text x="330" y="535" class="flow-text" text-anchor="middle">2</text>

  <line x1="470" y1="540" x2="490" y2="540" class="sse-arrow" />
  <text x="480" y="535" class="flow-text" text-anchor="middle">3</text>

  <path d="M 560 510 Q 560 470 110 470 Q 110 500 110 510" class="sse-arrow" fill="none" />
  <text x="335" y="465" class="flow-text" text-anchor="middle">4. Real-time updates</text>

  <!-- Polling Flow -->
  <text x="50" y="620" class="label-text">5. Polling Flow (Fallback)</text>

  <rect x="50" y="640" width="120" height="60" class="client-box" />
  <text x="110" y="665" class="step-text" text-anchor="middle">Looper</text>
  <text x="110" y="680" class="flow-text" text-anchor="middle">schedules</text>

  <rect x="200" y="640" width="120" height="60" class="server-box" />
  <text x="260" y="665" class="step-text" text-anchor="middle">Data Endpoint</text>
  <text x="260" y="680" class="flow-text" text-anchor="middle">repeated calls</text>

  <rect x="350" y="640" width="120" height="60" class="client-box" />
  <text x="410" y="665" class="step-text" text-anchor="middle">Store</text>
  <text x="410" y="680" class="flow-text" text-anchor="middle">ingestServerResponse</text>

  <line x1="170" y1="670" x2="190" y2="670" class="data-arrow" />
  <text x="180" y="665" class="flow-text" text-anchor="middle">poll</text>

  <line x1="320" y1="670" x2="340" y2="670" class="data-arrow" />
  <text x="330" y="665" class="flow-text" text-anchor="middle">merge</text>

  <path d="M 410 640 Q 410 600 110 600 Q 110 630 110 640" class="arrow" fill="none" />
  <text x="260" y="595" class="flow-text" text-anchor="middle">schedule next (ttlMs)</text>

  <!-- API Endpoints Reference -->
  <rect x="650" y="480" width="500" height="300" class="box" />
  <text x="900" y="500" class="label-text" text-anchor="middle">Key API Endpoints</text>

  <text x="670" y="525" class="label-text">Data Endpoints:</text>
  <text x="670" y="545" class="code-text">GET /api/data/livenets - List all nets</text>
  <text x="670" y="560" class="code-text">GET /api/data/livenets/:id - Specific net details</text>
  <text x="670" y="575" class="code-text">GET /api/data/favorites - User favorites</text>

  <text x="670" y="600" class="label-text">Interaction Endpoints:</text>
  <text x="670" y="620" class="code-text">POST /api/interactions/livenets/:id - Submit interaction</text>
  <text x="670" y="635" class="code-text">PATCH /api/interactions/:id - Update interaction</text>
  <text x="670" y="650" class="code-text">DELETE /api/interactions/:id - Remove interaction</text>

  <text x="670" y="675" class="label-text">Real-time Endpoints:</text>
  <text x="670" y="695" class="code-text">GET /api/sse/livenets/:id - Server-Sent Events</text>
  <text x="670" y="710" class="code-text">GET /api/presence/livenets/:id - Presence polling</text>

  <text x="670" y="735" class="label-text">Authentication:</text>
  <text x="670" y="755" class="code-text">POST /api/auth/magic - Magic link request</text>
  <text x="670" y="770" class="code-text">GET /api/auth/google - OAuth redirect</text>

  <!-- Response Processing -->
  <text x="50" y="790" class="label-text">6. Client Response Processing</text>

  <text x="50" y="815" class="flow-text">• ReactiveStore.ingestServerResponse() validates envelope</text>
  <text x="50" y="830" class="flow-text">• StationIndexer computes diffs for efficient widget updates</text>
  <text x="50" y="845" class="flow-text">• InFlightWindowManager reconciles optimistic updates</text>
  <text x="50" y="860" class="flow-text">• Widgets re-render only changed data via subscription callbacks</text>

</svg>