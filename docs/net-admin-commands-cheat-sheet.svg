<?xml version="1.0" encoding="UTF-8"?>
<svg width="850" height="1120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ham-live-title {
        font-family: 'Trebuchet MS', 'Arial', sans-serif;
        font-size: 38px;
        font-weight: bold;
        fill: #1a252f;
        text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
      }

      .cheat-sheet-title {
        font-family: 'Trebuchet MS', 'Arial', sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #f39c12;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
      }

      .subtitle {
        font-family: 'Arial', sans-serif;
        font-size: 16px;
        font-weight: 500;
        fill: #2c3e50;
      }

      .section-header {
        font-family: 'Arial', sans-serif;
        font-size: 14px;
        font-weight: bold;
        fill: #ffffff;
      }

      .command-text {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        font-weight: bold;
        fill: #2c3e50;
      }

      .description-text {
        font-family: 'Arial', sans-serif;
        font-size: 11px;
        fill: #34495e;
      }

      .example-text {
        font-family: 'Courier New', monospace;
        font-size: 10px;
        fill: #7f8c8d;
        font-style: italic;
      }

      .role-badge {
        font-family: 'Arial', sans-serif;
        font-size: 10px;
        font-weight: bold;
        fill: #ffffff;
      }

      .footer-text {
        font-family: 'Arial', sans-serif;
        font-size: 10px;
        fill: #7f8c8d;
      }

      .category-text {
        font-family: 'Arial', sans-serif;
        font-size: 12px;
        font-weight: bold;
        fill: #2c3e50;
      }

      .note-text {
        font-family: 'Arial', sans-serif;
        font-size: 10px;
        fill: #e74c3c;
        font-style: italic;
      }
    </style>
  </defs>

  <!-- Background with prominent border fill -->
  <rect width="850" height="1120" fill="#2c3e50" rx="8" />

  <!-- Border decoration -->
  <rect x="8" y="8" width="834" height="1104" fill="#34495e" rx="6" />

  <!-- Inner content area -->
  <rect x="20" y="20" width="810" height="1080" fill="#ffffff" rx="4" />

  <!-- Title Section -->
  <text x="425" y="65" class="ham-live-title" text-anchor="middle">NCS / Logger Cheat Sheet</text> <!-- Role Legend -->
  <rect x="35" y="95" width="780" height="90" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="4" />
  <text x="45" y="115" class="subtitle">Permission Hierarchy (Lower = Higher Privileges):</text>

  <!-- Net Control Badge -->
  <rect x="45" y="125" width="120" height="22" fill="#e74c3c" rx="11" stroke="#c0392b" stroke-width="1" />
  <text x="105" y="138" class="role-badge" text-anchor="middle">NET CONTROL (0)</text>
  <text x="175" y="138" class="description-text">netcontrol - Close net, handoff, frequency, logger promotion</text>

  <!-- Logger Badge -->
  <rect x="45" y="152" width="100" height="22" fill="#f39c12" rx="11" stroke="#e67e22" stroke-width="1" />
  <text x="95" y="165" class="role-badge" text-anchor="middle">LOGGER (1)</text>
  <text x="155" y="165" class="description-text">netlogger - Check-ins, relays, counts, hand management</text>

  <!-- Relay Badge -->
  <rect x="475" y="125" width="90" height="22" fill="#27ae60" rx="11" stroke="#229954" stroke-width="1" />
  <text x="520" y="138" class="role-badge" text-anchor="middle">RELAY (2)</text>
  <text x="575" y="138" class="description-text">netrelay - Limited privileges</text>

  <!-- User Badge -->
  <rect x="475" y="152" width="80" height="22" fill="#95a5a6" rx="11" stroke="#7f8c8d" stroke-width="1" />
  <text x="515" y="165" class="role-badge" text-anchor="middle">USER (3)</text>
  <text x="565" y="165" class="description-text">netuser - Basic help and info only</text>

  <!-- Net Control Commands Section -->
  <rect x="35" y="190" width="375" height="40" fill="#e74c3c" rx="4" />
  <text x="45" y="210" class="section-header">NET CONTROL COMMANDS (Level 0)</text>
  <text x="400" y="210" class="section-header" text-anchor="end">🔐 NCS Only</text>

  <!-- Net Control Commands -->
  <rect x="35" y="230" width="375" height="330" fill="#ffffff" stroke="#e74c3c" stroke-width="2" rx="4" />

  <!-- Close Net -->
  <text x="45" y="250" class="command-text">close</text>
  <text x="45" y="265" class="description-text">Close net and generate final report</text>
  <text x="45" y="277" class="example-text">Usage: close</text>

  <!-- Handoff -->
  <text x="45" y="300" class="command-text">handoff &lt;callsign&gt;</text>
  <text x="45" y="315" class="description-text">Transfer net control to another station</text>
  <text x="45" y="327" class="example-text">Usage: handoff W1ABC</text>

  <!-- Frequency -->
  <text x="45" y="350" class="command-text">f [frequency]</text>
  <text x="45" y="365" class="description-text">Set or display net frequency in MHz</text>
  <text x="45" y="377" class="example-text">Usage: f 146.52 or f (display)</text>

  <!-- Logger Promotion -->
  <text x="45" y="400" class="command-text">l &lt;callsign&gt; [callsign...]</text>
  <text x="45" y="415" class="description-text">Promote station(s) to logger role (1-5 max)</text>
  <text x="45" y="427" class="example-text">Usage: l W1ABC K2DEF</text>

  <!-- Owner Management -->
  <text x="45" y="450" class="command-text">owner [email]</text>
  <text x="45" y="465" class="description-text">List owners or add co-owner by email</text>
  <text x="45" y="477" class="example-text">Usage: owner user@example.com</text>

  <text x="45" y="530" class="note-text">Note: NCS can also use all Logger commands below</text>

  <!-- Logger Commands Section -->
  <rect x="430" y="190" width="375" height="40" fill="#f39c12" rx="4" />
  <text x="440" y="210" class="section-header">LOGGER COMMANDS (Level 1+)</text>
  <text x="795" y="210" class="section-header" text-anchor="end">📝 Logger</text>

  <!-- Logger Commands -->
  <rect x="430" y="230" width="375" height="530" fill="#ffffff" stroke="#f39c12" stroke-width="2" rx="4" />

  <!-- Check In Basic -->
  <text x="440" y="250" class="command-text">i [-h] &lt;callsign&gt;... | -l</text>
  <text x="440" y="265" class="description-text">Check-in stations (1-20 max, or lurkers)</text>
  <text x="440" y="277" class="example-text">Usage: i W1ABC K2DEF</text>
  <text x="440" y="289" class="example-text">Options: i -h W1ABC (highlight)</text>
  <text x="440" y="301" class="example-text"> i -l (all lurkers)</text>

  <!-- Check In with Highlight -->
  <text x="440" y="325" class="command-text">hi &lt;callsign&gt;...</text>
  <text x="440" y="340" class="description-text">Check-in stations with highlighting (1-20 max)</text>
  <text x="440" y="352" class="example-text">Usage: hi W1ABC K2DEF</text>

  <!-- Check In Lurkers -->
  <text x="440" y="375" class="command-text">li</text>
  <text x="440" y="390" class="description-text">Check-in all lurker stations at once</text>
  <text x="440" y="402" class="example-text">Usage: li</text>

  <!-- Check Out -->
  <text x="440" y="425" class="command-text">o &lt;callsign&gt;...</text>
  <text x="440" y="440" class="description-text">Check-out stations (1-20 max)</text>
  <text x="440" y="452" class="example-text">Usage: o W1ABC K2DEF</text>

  <!-- Check In/Out -->
  <text x="440" y="475" class="command-text">io &lt;callsign&gt;...</text>
  <text x="440" y="490" class="description-text">Check-in then immediately check-out (1-20 max)</text>
  <text x="440" y="502" class="example-text">Usage: io W1ABC (for quick log)</text>

  <!-- Undo Check In -->
  <text x="440" y="525" class="command-text">ui &lt;callsign&gt;...</text>
  <text x="440" y="540" class="description-text">Undo check-in status (1-20 max)</text>
  <text x="440" y="552" class="example-text">Usage: ui W1ABC</text>

  <!-- Promote to Relay -->
  <text x="440" y="575" class="command-text">r &lt;callsign&gt;...</text>
  <text x="440" y="590" class="description-text">Promote station(s) to relay role (1-5 max)</text>
  <text x="440" y="602" class="example-text">Usage: r W1ABC K2DEF</text>

  <!-- Count -->
  <text x="440" y="625" class="command-text">c</text>
  <text x="440" y="640" class="description-text">Display net statistics and counts</text>
  <text x="440" y="652" class="example-text">Usage: c</text>

  <!-- Hand State Management -->
  <text x="440" y="675" class="command-text">hand {-u|-d} &lt;callsign&gt; [-a]</text>
  <text x="440" y="690" class="description-text">Manage hand-raised state</text>
  <text x="440" y="702" class="example-text">Usage: hand -u W1ABC (raise)</text>
  <text x="440" y="714" class="example-text"> hand -d -a (lower all)</text>

  <!-- Universal Commands Section -->
  <rect x="30" y="660" width="385" height="40" fill="#27ae60" rx="4" />
  <text x="40" y="680" class="section-header">UNIVERSAL COMMANDS (All Users)</text>
  <text x="360" y="680" class="section-header">📚 Info</text>

  <rect x="30" y="700" width="385" height="120" fill="#ffffff" stroke="#27ae60" stroke-width="2" rx="4" />

  <!-- Help -->
  <text x="40" y="720" class="command-text">help [command] / ? [command]</text>
  <text x="40" y="735" class="description-text">Display available commands or specific help</text>
  <text x="40" y="747" class="example-text">Usage: help or ? or help i</text>

  <!-- Who Am I -->
  <text x="40" y="770" class="command-text">w [callsign]</text>
  <text x="40" y="785" class="description-text">Display role and level information</text>
  <text x="40" y="797" class="example-text">Usage: w or w W1ABC</text>

  <!-- Permission Notes -->
  <rect x="30" y="840" width="790" height="40" fill="#9b59b6" rx="4" />
  <text x="40" y="860" class="section-header">PERMISSION RULES &amp; NOTES</text>

  <rect x="30" y="880" width="790" height="120" fill="#ffffff" stroke="#9b59b6" stroke-width="2" rx="4" />

  <text x="40" y="900" class="category-text">Access Rules:</text>
  <text x="40" y="915" class="description-text">• Users can only modify stations with higher level numbers (lower privileges)</text>
  <text x="40" y="930" class="description-text">• Net Control (0) can modify anyone • Logger (1) can modify Relay (2) and User (3)</text>
  <text x="40" y="945" class="description-text">• Multiple callsigns: Check-in/out commands accept 1-20 callsigns, roles accept 1-5</text>

  <text x="450" y="900" class="category-text">Command Features:</text>
  <text x="450" y="915" class="description-text">• Real-time updates via Server-Sent Events (SSE)</text>
  <text x="450" y="930" class="description-text">• Case-insensitive callsigns • Audit logging enabled</text>
  <text x="450" y="945" class="description-text">• Transaction-safe database operations</text>

  <!-- Quick Reference Grid -->
  <rect x="30" y="1020" width="790" height="40" fill="#34495e" rx="4" />
  <text x="40" y="1040" class="section-header" fill="#ffffff">QUICK COMMAND REFERENCE GRID</text>

  <rect x="30" y="1060" width="790" height="30" fill="#ffffff" stroke="#34495e" stroke-width="1" rx="4" />

  <!-- Quick Grid Content -->
  <text x="40" y="1077" class="description-text" style="font-weight: bold;">Check-ins: i, hi, li, o, io, ui</text>
  <text x="280" y="1077" class="description-text" style="font-weight: bold;">Roles: l, r, handoff</text>
  <text x="450" y="1077" class="description-text" style="font-weight: bold;">Net: close, f, owner</text>
  <text x="620" y="1077" class="description-text" style="font-weight: bold;">Info: c, w, help, hand</text>

</svg>